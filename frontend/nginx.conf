server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files directly. If the file doesn't exist,
    # fall back to index.html so Vue Router can handle the route.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively — Vite adds content hashes to filenames
    # (e.g., app.a1b2c3.js), so a new build = new filename = cache busted automatically.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
